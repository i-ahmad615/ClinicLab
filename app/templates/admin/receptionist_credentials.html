{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Receptionist Credentials</h2>
    <a class="btn btn-outline-secondary" href="{{ url_for('dashboard.index') }}">Back</a>
</div>

<div class="card p-3">
    <form method="post">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Username *</label>
                <input type="text" name="username" class="form-control" value="{{ receptionist_user.username if receptionist_user else '' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Password *</label>
                <input type="password" name="password" class="form-control" required>
            </div>
        </div>

        <div class="mt-4 d-flex gap-2">
            <button class="btn btn-primary" type="submit">Save</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('dashboard.index') }}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
