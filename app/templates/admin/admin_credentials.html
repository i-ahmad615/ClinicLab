{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>My Login Credentials</h2>
    <a class="btn btn-outline-secondary" href="{{ url_for('dashboard.index') }}">Back</a>
</div>

<div class="card p-3">
    <form method="post">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">New Username *</label>
                <input type="text" name="username" class="form-control" value="{{ request.form.get('username', current_user.username) }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Current Password *</label>
                <input type="password" name="current_password" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">New Password (optional)</label>
                <input type="password" name="new_password" class="form-control" minlength="6">
            </div>
            <div class="col-md-6">
                <label class="form-label">Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" minlength="6">
            </div>
        </div>

        <div class="mt-4 d-flex gap-2">
            <button class="btn btn-primary" type="submit">Update Credentials</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('dashboard.index') }}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
