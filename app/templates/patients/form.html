{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>{% if patient %}Edit Patient{% else %}New Patient{% endif %}</h2>
    <a class="btn btn-outline-secondary" href="{{ url_for('patients.list_patients') }}">Back</a>
</div>

<div class="card p-3">
    <form method="post">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Patient ID</label>
                <input type="text" class="form-control" value="{{ patient_id }}" readonly>
            </div>
            <div class="col-md-3">
                <label class="form-label">CNIC *</label>
                <input type="text" name="cnic" class="form-control" value="{{ patient.cnic if patient else '' }}" placeholder="1234512345671" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">First Name *</label>
                <input type="text" name="first_name" class="form-control" value="{{ patient.first_name if patient else '' }}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Last Name</label>
                <input type="text" name="last_name" class="form-control" value="{{ patient.last_name if patient else '' }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Gender *</label>
                <select class="form-select" name="gender" required>
                    <option value="">Select</option>
                    {% for option in ['Male', 'Female', 'Other'] %}
                    <option value="{{ option }}" {% if patient and patient.gender == option %}selected{% endif %}>{{ option }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">DOB</label>
                <input type="date" id="dob" name="dob" class="form-control" value="{{ patient.dob if patient and patient.dob else '' }}">
            </div>
            <div class="col-md-2">
                <label class="form-label">Age</label>
                <input type="number" id="age" name="age" class="form-control" value="{{ patient.age if patient else '' }}" readonly>
            </div>
            <div class="col-md-4">
                <label class="form-label">Phone *</label>
                <input type="text" name="phone" class="form-control" value="{{ patient.phone if patient else '' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Emergency Contact</label>
                <input type="text" name="emergency_contact" class="form-control" value="{{ patient.emergency_contact if patient else '' }}">
            </div>
            <div class="col-md-4">
                <label class="form-label">Blood Group</label>
                <select class="form-select" name="blood_group">
                    <option value="">Select</option>
                    {% for option in ['A+', 'A-', 'B+', 'B-', 'AB+', 'AB-', 'O+', 'O-'] %}
                    <option value="{{ option }}" {% if patient and patient.blood_group == option %}selected{% endif %}>{{ option }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Address</label>
                <input type="text" name="address" class="form-control" value="{{ patient.address if patient else '' }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">City</label>
                <input type="text" name="city" class="form-control" value="{{ patient.city if patient else '' }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Occupation</label>
                <input type="text" name="occupation" class="form-control" value="{{ patient.occupation if patient else '' }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Marital Status</label>
                <select class="form-select" name="marital_status">
                    <option value="">Select</option>
                    {% for option in ['Single', 'Married', 'Divorced', 'Widowed'] %}
                    <option value="{{ option }}" {% if patient and patient.marital_status == option %}selected{% endif %}>{{ option }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-9">
                <label class="form-label">Known Allergies</label>
                <input type="text" name="known_allergies" class="form-control" value="{{ patient.known_allergies if patient else '' }}">
            </div>
            <div class="col-md-9">
                <label class="form-label">Known Diseases</label>
                <input type="text" name="known_diseases" class="form-control" value="{{ patient.known_diseases if patient else '' }}">
            </div>
            <div class="col-md-12">
                <label class="form-label">Remarks</label>
                <textarea name="remarks" class="form-control" rows="2">{{ patient.remarks if patient else '' }}</textarea>
            </div>
        </div>

        <div class="mt-4 d-flex gap-2">
            <button class="btn btn-primary" type="submit" name="action" value="save">Save</button>
            {% if not patient %}
            <button class="btn btn-outline-primary" type="submit" name="action" value="save_create_visit">Save & Create Visit</button>
            {% endif %}
            <a class="btn btn-outline-secondary" href="{{ url_for('patients.list_patients') }}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
