databases:
  - name: cliniclab-db
    plan: free
    databaseName: cliniclab
    user: cliniclab_user

services:
  - type: web
    name: cliniclab
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn 'app:create_app()'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cliniclab-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true